<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Farview E2E 测试页</title>
    <style>
      body {
        font:
          15px/1.6 system-ui,
          sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 16px;
      }
      h1 {
        font-size: 20px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 12px 0;
      }
      button {
        padding: 8px 14px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
      }
      button:hover {
        background: #f2f2f2;
      }
      input {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 8px;
      }
      #state {
        padding: 8px 12px;
        border-radius: 8px;
        background: #f6f6f6;
        font-family: monospace;
      }
      section {
        margin: 20px 0;
        padding: 12px 16px;
        border: 1px solid #eee;
        border-radius: 12px;
      }
      h2 {
        font-size: 14px;
        color: #666;
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <h1>Farview E2E 测试页</h1>
    <p id="state">
      agent 状态：<b id="agentState">未加载</b>（仅当 URL 带 <code>?debug=</code> 时加载）
    </p>

    <section>
      <h2>Console</h2>
      <div class="row">
        <button data-act="log">console.log</button>
        <button data-act="warn">console.warn</button>
        <button data-act="error">console.error</button>
        <button data-act="throw">抛未捕获异常</button>
      </div>
    </section>

    <section>
      <h2>Network</h2>
      <div class="row">
        <button data-act="fetch-ok">fetch 200 (JSON)</button>
        <button data-act="fetch-404">fetch 404</button>
        <button data-act="fetch-fail">fetch 失败(跨域/断网)</button>
      </div>
    </section>

    <section>
      <h2>环境 / 镜像 / eval</h2>
      <p>环境快照、镜像画面由 agent 自动上报；eval 从 viewer 端执行，无需页面按钮。</p>
      <div class="row">
        <button data-act="mutate">改一下 DOM（验证镜像实时性）</button>
      </div>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
